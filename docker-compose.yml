version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AEM Local SDK — docker-compose.yml
#
# Prerequisites:
#   1. Place your aem-sdk-*.zip in this directory
#   2. Run: ./aem-setup.sh          (extracts JARs, creates folders, writes .env)
#   3. Run: docker compose up --build
#   4. Run: ./start-dispatcher.sh   (starts dispatcher separately on host)
#
# NOTE: The Dispatcher is NOT managed by docker compose.
# The SDK's docker_run.sh manages its own container — run it via start-dispatcher.sh.
#
# All variables are read from .env (generated by aem-setup.sh).
# ─────────────────────────────────────────────────────────────────────────────

x-aem-common: &aem-common
  image: eclipse-temurin:${JAVA_VERSION:-21}-jdk
  restart: unless-stopped

services:

  # ── Author (port 4502) ──────────────────────────────────────────────────────
  aem-author:
    <<: *aem-common
    container_name: aem-author
    hostname: aem-author
    ports:
      - "${AUTHOR_PORT:-4502}:${AUTHOR_PORT:-4502}"
    volumes:
      - ./author:/aem/author
      - ./start-author.sh:/start.sh:ro
    environment:
      AEM_ADMIN_USER:           ${AEM_ADMIN_USER:-admin}
      AEM_ADMIN_PASSWORD:       ${AEM_ADMIN_PASSWORD:-admin}
      AUTHOR_PORT:              ${AUTHOR_PORT:-4502}
      AUTHOR_JVM_OPTS:          ${AUTHOR_JVM_OPTS:--Xmx2048m -Xms512m}
      AUTHOR_EXTRA_RUNMODES:    ${AUTHOR_EXTRA_RUNMODES:-nosamplecontent}
    entrypoint: ["/bin/bash", "/start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/${AUTHOR_PORT:-4502}' 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    networks:
      - aem-net

  # ── Publish (port 4503) ────────────────────────────────────────────────────
  aem-publish:
    <<: *aem-common
    container_name: aem-publish
    hostname: aem-publish
    ports:
      - "${PUBLISH_PORT:-4503}:${PUBLISH_PORT:-4503}"
    volumes:
      - ./publish:/aem/publish
      - ./start-publish.sh:/start.sh:ro
    environment:
      AEM_ADMIN_USER:           ${AEM_ADMIN_USER:-admin}
      AEM_ADMIN_PASSWORD:       ${AEM_ADMIN_PASSWORD:-admin}
      PUBLISH_PORT:             ${PUBLISH_PORT:-4503}
      PUBLISH_JVM_OPTS:         ${PUBLISH_JVM_OPTS:--Xmx2048m -Xms512m}
      PUBLISH_EXTRA_RUNMODES:   ${PUBLISH_EXTRA_RUNMODES:-nosamplecontent}
    entrypoint: ["/bin/bash", "/start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/${PUBLISH_PORT:-4503}' 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    networks:
      - aem-net

networks:
  aem-net:
    driver: bridge
