version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AEM Local SDK — docker-compose.yml
#
# Prerequisites:
#   1. Place your aem-sdk-*.zip in this directory
#   2. Run: ./aem-setup.sh          (extracts JARs, creates folders, writes .env)
#   3. Run: docker compose up --build
#
# All variables are read from .env (generated by aem-setup.sh).
# To change Java version or ports, edit .env and rebuild.
# ─────────────────────────────────────────────────────────────────────────────

x-aem-common: &aem-common
  # Java image — JAVA_VERSION is set in .env (default: 17)
  image: eclipse-temurin:${JAVA_VERSION:-17}-jdk
  restart: unless-stopped
  environment:
    AEM_ADMIN_USER:     ${AEM_ADMIN_USER:-admin}
    AEM_ADMIN_PASSWORD: ${AEM_ADMIN_PASSWORD:-admin}

services:

  # ── Author (port 4502) ──────────────────────────────────────────────────────
  aem-author:
    <<: *aem-common
    container_name: aem-author
    hostname: aem-author
    ports:
      - "${AUTHOR_PORT:-4502}:${AUTHOR_PORT:-4502}"
    volumes:
      - ./author:/aem/author          # instance working dir (JAR + crx-quickstart)
      - ./start-author.sh:/start.sh:ro
    environment:
      AEM_ADMIN_USER:           ${AEM_ADMIN_USER:-admin}
      AEM_ADMIN_PASSWORD:       ${AEM_ADMIN_PASSWORD:-admin}
      AUTHOR_PORT:              ${AUTHOR_PORT:-4502}
      AUTHOR_JVM_OPTS:          ${AUTHOR_JVM_OPTS:--Xmx2048m -Xms512m}
      AUTHOR_EXTRA_RUNMODES:    ${AUTHOR_EXTRA_RUNMODES:-nosamplecontent}
    entrypoint: ["/bin/bash", "/start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/${AUTHOR_PORT:-4502}' 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s    # AEM takes ~2-5 min on first boot
    networks:
      - aem-net

  # ── Publish (port 4503) ────────────────────────────────────────────────────
  aem-publish:
    <<: *aem-common
    container_name: aem-publish
    hostname: aem-publish
    ports:
      - "${PUBLISH_PORT:-4503}:${PUBLISH_PORT:-4503}"
    volumes:
      - ./publish:/aem/publish        # instance working dir (JAR + crx-quickstart)
      - ./start-publish.sh:/start.sh:ro
    environment:
      AEM_ADMIN_USER:           ${AEM_ADMIN_USER:-admin}
      AEM_ADMIN_PASSWORD:       ${AEM_ADMIN_PASSWORD:-admin}
      PUBLISH_PORT:             ${PUBLISH_PORT:-4503}
      PUBLISH_JVM_OPTS:         ${PUBLISH_JVM_OPTS:--Xmx2048m -Xms512m}
      PUBLISH_EXTRA_RUNMODES:   ${PUBLISH_EXTRA_RUNMODES:-nosamplecontent}
    entrypoint: ["/bin/bash", "/start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/${PUBLISH_PORT:-4503}' 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    networks:
      - aem-net

  # ── Dispatcher (port 80) ───────────────────────────────────────────────────
  aem-dispatcher:
    # The AEM SDK Dispatcher Tools ship their own Docker image internally.
    # We use the Adobe-provided base image for dispatcher compatibility.
    image: adobe/aem-ethos/dispatcher-publish:2.0.23
    container_name: aem-dispatcher
    hostname: aem-dispatcher
    ports:
      - "${DISPATCHER_PORT:-80}:80"
    volumes:
      - ./dispatcher:/aem/dispatcher  # extracted dispatcher tools + src config
      - ./start-dispatcher.sh:/start-dispatcher.sh:ro
    environment:
      PUBLISH_HOST:   aem-publish
      PUBLISH_PORT:   ${PUBLISH_PORT:-4503}
      DISPATCHER_PORT: ${DISPATCHER_PORT:-80}
      # Disable TLS for local dev
      HTTPS_PORT:     "disabled"
    depends_on:
      aem-publish:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/start-dispatcher.sh"]
    networks:
      - aem-net

networks:
  aem-net:
    driver: bridge
